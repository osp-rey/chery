<section
  class="s-connect sect-p"
  id="s-connect"
  style="background: url(&quot;@img/connect.jpg&quot;) center / cover no-repeat"
>
  <div class="container">
    <div class="s-connect__info">
      <h2 class="s-title">
        Понравилась определенная модель? Оставьте заявку
        <span>прямо сейчас!</span>
      </h2>
      <div class="content-box s-connect__content">
        Получите индивидуальное предложение на новый TENET/CHERY и консультацию
        от официального дилера!
      </div>
      <div
        data-models-options="Модель 1, Модель 2, Модель 3"
        data-marks-options="Марка 1, Марка 2, Марка 3"
      >
        <form action="#" class="s-connect__form">
          <div class="form-grid">
            <div class="input-control">
              <div class="select" data-target-options="marks">
                <div class="select-btn _white">
                  <input
                    type="text"
                    placeholder="Марка"
                    readonly
                    class="input select-input _outline-white"
                  />
                  <svg class="arrow">
                    <use xlink:href="img/icons/icons.svg#icon-bottom"></use>
                  </svg>
                </div>
                <div class="select-body"></div>
              </div>
            </div>
            <div class="input-control">
              <div class="select" data-target-options="models">
                <div class="select-btn _white">
                  <input
                    type="text"
                    placeholder="Модель"
                    readonly
                    class="input select-input _outline-white"
                  />
                  <svg class="arrow">
                    <use xlink:href="img/icons/icons.svg#icon-bottom"></use>
                  </svg>
                </div>
                <div class="select-body"></div>
              </div>
            </div>
            <div class="input-control">
              <input type="text" placeholder="Имя" class="input _outline-white" />
            </div>
            <div class="input-control">
              <input type="tel" placeholder="Телефон" class="input _outline-white" />
            </div>
            <button type="submit" class="btn-s _blur">Оставить заявку</button>
            <div class="form-check">
              <div class="check-wrapper _white">
                <span class="wpcf7-form-control-wrap">
                  <span class="wpcf7-form-control wpcf7-acceptance">
                    <span class="wpcf7-list-item">
                      <label>
                        <input type="checkbox" name="acceptance-469" />
                        <span class="wpcf7-list-item-label">
                          <span>
                            Я даю согласие на
                            <a href="/personal-data" target="_blank">
                              Обработку персональных данных
                            </a>
                          </span>
                        </span>
                      </label>
                    </span>
                  </span>
                </span>
              </div>
              <div class="check-wrapper _white">
                <span class="wpcf7-form-control-wrap">
                  <span class="wpcf7-form-control wpcf7-acceptance">
                    <span class="wpcf7-list-item">
                      <label>
                        <input type="checkbox" name="acceptance-469" />
                        <span class="wpcf7-list-item-label">
                          <span>
                            Соглашаюсь на
                            <a href="/advertisement-policy" target="_blank">
                              Получение информационно-рекламной рассылки
                            </a>
                          </span>
                        </span>
                      </label>
                    </span>
                  </span>
                </span>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
